<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Список команд NBA</title>
</head>
<body>
    <h1>Список команд NBA</h1>
    <ul>
        {% for team in teams %}
            <li>
                <a href="{% url 'team_detail' team.abbreviation %}">{{ team.city }} {{ team.name }}</a> ({{ team.conference }})
            </li>
        {% empty %}
            <li>Команды не загружены.</li>
        {% endfor %}
    </ul>
</body>
</html>
